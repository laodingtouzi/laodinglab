<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>中国电力市场跟踪分析 v55</title>

    .section:last-child{margin-bottom:0}
    .section-label{font-weight:600;color:#1e293b;margin-bottom:12px;font-size:18px}
    .region-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center}

    .region-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
    .region-btn.all-btn{background:#e8f4fd;border-color:#94b8d4;color:#3b82f6}

    .province-chip.selected{background:#3b82f6;color:#fff}

    .no-prov{color:#94a3b8;font-size:15px;font-style:italic;padding:6px 0}

    .year-row{display:flex;gap:12px;align-items:center;margin-top:14px}
    select{padding:10px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:17px;color:#1e293b;background:#fff;cursor:pointer;font-family:inherit}
    select:focus{outline:none;border-color:#3b82f6}
    .query-btn{padding:10px 28px;background:#1e293b;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit}
    .query-btn:hover{background:#334155}
    .result-area{margin-top:28px;display:none}
    .result-area.visible{display:block}
    .result-section{background:#fff;border-radius:16px;padding:28px;margin-bottom:28px;box-shadow:0 1px 3px rgba(0,0,0,.08)}

    .tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6;font-weight:600}

    td.red{color:#dc2626;font-weight:600}

    .chart-title{font-size:18px;font-weight:600;color:#1e293b;margin-bottom:12px;text-align:center}
    canvas{display:block;width:100%;min-width:900px}
    /* 分隔 */
    .divider{height:1px;background:#e2e8f0;margin:28px 0}
    .note{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:14px 18px;font-size:15px;color:#92400e;margin-top:12px;line-height:1.6}

</head>

  </div>

  <div class="result-area" id="resultArea">

    <div class="result-section">

      <div class="tab-bar" id="tabBar">

      <div class="tab-content active" id="tab1">
        <div id="tab1Content"></div>
      </div>
      <!-- 装机Tab -->
      <div class="tab-content" id="tab2">
        <div id="tab2Content"></div>
      </div>
      <!-- 用电Tab -->
      <div class="tab-content" id="tab3">
        <div id="tab3Content"></div>
      </div>
      <!-- 电力市场Tab -->
      <div class="tab-content" id="tab4">
        <div id="tab4Content"></div>
      </div>
      <!-- 储能政策Tab -->
      <div class="tab-content" id="tab5">
        <div id="tab5Content"></div>
      </div>
      <!-- 绿电交易Tab -->
      <div class="tab-content" id="tab6">
        <div id="tab6Content"></div>
      </div>
    </div>

      <h2>Part 2 · 各省核心指标对比 <span id="tableTitle" style="font-size:16px;font-weight:400;color:#64748b"></span></h2>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <p class="small" style="margin-top:10px">⚠️ 发电量/装机为按比例推算值；电力平衡正值为富余、负值为缺口；实测字段已标注来源</p>
    </div>

    <!-- Part 3: 月度趋势 -->

        <canvas id="mainCanvas"></canvas>
      </div>

    </div>

      <div class="chart-wrap">
        <canvas id="historyCanvas"></canvas>
      </div>
    </div>
  </div>
</div>

/* ======================================================
   渲染区域按钮
   ====================================================== */
function renderRegions(){
  var wrap=document.getElementById('regionBtns');
  wrap.innerHTML='';
  // 全国按钮放最左
  var allBtn=document.createElement('button');
  allBtn.className='region-btn all-btn'+(isAll?' active':'');
  allBtn.textContent='全国';
  allBtn.onclick=toggleAll;
  wrap.appendChild(allBtn);
  // 区域按钮
  Object.keys(REGIONS).forEach(function(r){
    var btn=document.createElement('button');
    btn.className='region-btn';
    btn.textContent=r;
    btn.onclick=(function(region){ return function(){ toggleRegion(region); }; })(r);
    var any=REGIONS[r].some(function(p){ return selectedProvinces.indexOf(p)>-1; });
    if(any) btn.classList.add('active');
    wrap.appendChild(btn);
  });
}

/* ======================================================
   切换区域
   ====================================================== */
function toggleRegion(region){
  var ps=REGIONS[region];
  var any=ps.some(function(p){ return selectedProvinces.indexOf(p)>-1; });
  if(any){
    selectedProvinces=selectedProvinces.filter(function(p){ return ps.indexOf(p)===-1; });
  } else {
    ps.forEach(function(p){ if(selectedProvinces.indexOf(p)===-1) selectedProvinces.push(p); });
  }
  isAll=false;
  renderRegions();renderProvinces();
}

function toggleAll(){
  isAll=!isAll;
  if(isAll){ selectedProvinces=[]; }
  else { selectedProvinces=ALL_PROVINCES.slice(); }
  renderRegions();renderProvinces();
}

/* ======================================================
   渲染省份chips
   ====================================================== */
function renderProvinces(){
  var c=document.getElementById('provinceChips');
  var provs=isAll&&selectedProvinces.length>0?ALL_PROVINCES:selectedProvinces;
  if(provs.length===0){ c.innerHTML='<div class="no-prov">请选择大区或点击"全国"查看全部省份</div>'; return; }
  c.innerHTML='';
  provs.forEach(function(p){
    var chip=document.createElement('div');
    chip.className='province-chip'+(isAll?'':' selected');
    chip.innerHTML=p+'<span class="x">✕</span>';
    chip.onclick=(function(pn){ return function(){
      if(isAll){ isAll=false; selectedProvinces=ALL_PROVINCES.filter(function(x){ return x!==pn; }); }
      else { selectedProvinces=selectedProvinces.filter(function(x){ return x!==pn; }); }
      renderRegions();renderProvinces();
    }; })(p);
    c.appendChild(chip);
  });
  if(!isAll && selectedProvinces.length>1){
    var hint=document.createElement('div');
    hint.className='province-chip single-hint';
    hint.innerHTML='➜ 仅看单省';
    hint.onclick=function(){
      selectedProvinces=[selectedProvinces[0]];
      renderRegions();renderProvinces();
    };
    c.appendChild(hint);
  }
}

/* ======================================================
   Part3: 月度趋势图（含最高/最低标注）
   ====================================================== */
function drawChart(provs,yearSel){
  var canvas=document.getElementById('mainCanvas');
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  var W=Math.max(900,canvas.getBoundingClientRect().width||canvas.parentElement.clientWidth||900);
  var H=440;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);

  var isQ1=yearSel==='2026Q1';
  var label=isAll?'全国':(provs.slice(0,2).join('/')+(provs.length>2?'等'+provs.length+'省':''));
  document.getElementById('chartTitle').textContent=label+' · '+yearSel+' 月度用电量趋势';

  // 对Q1特殊处理
  if(isQ1){
    drawChartQ1(provs,ctx,W,H,label);
    return;
  }

  var PL=60,PR=35,PT=50,PB=75,cW=W-PL-PR,cH=H-PT-PB;
  var xStep=cW/(MONTHS.length-1);

  // 收集省份月度数据
  var datasets=provs.map(function(p,i){
    var d=PROV_2025[p];
    var baseY=HISTORY[p]&&HISTORY[p][yearSel]||d.用电量;
    var vals=MONTHLY_RATIOS_2025.map(function(r){ return Math.round(r*baseY); });
    return {label:p,vals:vals};
  });

  // 计算均值、最高（含省份）、最低（含省份）
  var monthCount=MONTHS.length;
  var avgVals=[],maxVals=[],maxProv=[],minVals=[],minProv=[];
  for(var mi=0;mi<monthCount;mi++){
    var s=0,maxV=-Infinity,minV=Infinity,maxP='',minP='';
    datasets.forEach(function(ds){
      var v=ds.vals[mi];
      s+=v;
      if(v>maxV){maxV=v;maxP=ds.label;}
      if(v<minV){minV=v;minP=ds.label;}
    });
    avgVals.push(s/datasets.length);
    maxVals.push(maxV);maxProv.push(maxP);
    minVals.push(minV);minProv.push(minP);
  }

  var allAggVals=avgVals.concat(maxVals).concat(minVals);
  var maxY=Math.max.apply(null,allAggVals)*1.15;
  var minY=0;
  var yRange=maxY-minY;

  var toX=function(i){ return PL+i*xStep; };
  var toY=function(v){ return PT+cH-((v-minY)/yRange)*cH; };

  // 背景+网格
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  for(var i=0;i<=5;i++){
    var v=minY+(yRange/5)*i,y=toY(v);
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+cW,y);
    ctx.strokeStyle='#f1f5f9';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(v).toLocaleString(),PL-8,y+4);
  }
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,PT+cH);ctx.lineTo(PL+cW,PT+cH);ctx.stroke();
  ctx.fillStyle='#64748b';ctx.font='13px sans-serif';ctx.textAlign='center';
  MONTHS.forEach(function(m,i){ ctx.fillText(m,toX(i),PT+cH+20); });

  // 图例（均值/最高（省份）/最低（省份））
  ctx.fillStyle='#475569';ctx.font='12px sans-serif';ctx.textAlign='left';
  // 均值
  ctx.beginPath();ctx.moveTo(PL,8);ctx.lineTo(PL+22,8);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=3;ctx.stroke();
  ctx.fillText('均值（'+provs.length+'省平均）',PL+26,12);
  // 最高
  ctx.beginPath();ctx.moveTo(PL+170,8);ctx.lineTo(PL+192,8);
  ctx.strokeStyle='#dc2626';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillText('最高（标注省份）',PL+196,12);
  // 最低
  ctx.beginPath();ctx.moveTo(PL+330,8);ctx.lineTo(PL+352,8);
  ctx.strokeStyle='#2563eb';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillText('最低（标注省份）',PL+356,12);

  // 均值折线（粗黑）
  ctx.beginPath();
  avgVals.forEach(function(v,i){
    var x=toX(i),y=toY(v);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#1e293b';ctx.lineWidth=3;ctx.stroke();

  // 最高折线（红色）+ 省份标注
  ctx.beginPath();
  maxVals.forEach(function(v,i){
    var x=toX(i),y=toY(v);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#dc2626';ctx.lineWidth=1.5;ctx.stroke();
  // 标注省份名
  maxVals.forEach(function(v,i){
    if(i%2===0){ // 每隔一个月标一次，避免拥挤
      var x=toX(i),y=toY(v);
      ctx.fillStyle='#dc2626';ctx.font='11px sans-serif';ctx.textAlign='center';
      ctx.fillText(maxProv[i],x,y-6);
    }
  });

  // 最低折线（蓝色）+ 省份标注
  ctx.beginPath();
  minVals.forEach(function(v,i){
    var x=toX(i),y=toY(v);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#2563eb';ctx.lineWidth=1.5;ctx.stroke();
  minVals.forEach(function(v,i){
    if(i%2===0){
      var x=toX(i),y=toY(v);
      ctx.fillStyle='#2563eb';ctx.font='11px sans-serif';ctx.textAlign='center';
      ctx.fillText(minProv[i],x,y+14);
    }
  });

  // 底部说明
  ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText('注：最高/最低省份每两个月标注一次，灰色省份标签=最低（下方），红色省份标签=最高（上方）',PL,PT+cH+38);
}

/* Q1月度图（只有1-3月实测） */
function drawChartQ1(provs,ctx,W,H,label){
  var canvas=document.getElementById('mainCanvas');
  var dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);

  var PL=60,PR=35,PT=50,PB=55,cW=W-PL-PR,cH=H-PT-PB;
  var months3=['1月','2月','3月'];
  var xStep=cW/2;

  // Q1各省数据（用电量直接用表11）
  var datasets=provs.map(function(p,i){
    var d=PROV_2026Q1[p];
    if(!d) return null;
    return {label:p,vals:[d.用电量,d.用电量,d.用电量],color:COLORS[i%COLORS.length]}; // 三个值相同，只为保持结构
  }).filter(function(d){ return d!==null; });

  // 只取第一个月的数据画柱状
  var vals3=provs.map(function(p){
    var d=PROV_2026Q1[p];
    return d?d.用电量:0;
  });

  var maxV=Math.max.apply(null,vals3)*1.2;
  var toX=function(i){ return PL+i*xStep; };
  var toY=function(v){ return PT+cH-(v/maxV)*cH; };
  var barW=Math.min(xStep*0.25,20);

  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  for(var i=0;i<=5;i++){
    var v=(maxV/5)*i,y=toY(v);
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+cW,y);
    ctx.strokeStyle='#f1f5f9';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(v).toLocaleString(),PL-8,y+4);
  }
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,PT+cH);ctx.lineTo(PL+cW,PT+cH);ctx.stroke();
  ctx.fillStyle='#64748b';ctx.font='13px sans-serif';ctx.textAlign='center';
  ctx.fillText('1月（实测）',toX(0),PT+cH+20);
  ctx.fillText('2月（参考1-2月合计÷2）',toX(1),PT+cH+20);
  ctx.fillText('3月（实测）',toX(2),PT+cH+20);

  // 画柱状
  var sortedProv=provs.slice().sort(function(a,b){ return (PROV_2026Q1[b]?PROV_2026Q1[b].用电量:0)-(PROV_2026Q1[a]?PROV_2026Q1[a].用电量:0); });
  var top5=sortedProv.slice(0,5);
  var maxLeg=Math.min(top5.length,5);
  top5.slice(0,maxLeg).forEach(function(ds,di){
    ctx.beginPath();ctx.arc(PL+di*80+6,10,5,0,Math.PI*2);ctx.fillStyle=COLORS[provs.indexOf(ds)%COLORS.length];ctx.fill();
    ctx.fillStyle='#475569';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText(ds,PL+di*80+16,14);
  });

  // 3月柱状（最高省份）
  var mar=col=>{ ctx.fillStyle=col+'cc'; };
  var sortedBy3=provs.slice().sort(function(a,b){ return (PROV_2026Q1[b]?PROV_2026Q1[b].用电量:0)-(PROV_2026Q1[a]?PROV_2026Q1[a].用电量:0); });
  var barCount=Math.min(8,provs.length);
  var gap=xStep*0.6/barCount;
  for(var bi=0;bi<barCount;bi++){
    var p=provs[bi];
    var d=PROV_2026Q1[p];
    if(!d) continue;
    var bx=toX(2)+xStep*0.2-barCount*gap/2+bi*gap;
    var bh=Math.abs(toY(d.用电量)-toY(0));
    var by=toY(d.用电量);
    ctx.fillStyle=COLORS[bi%COLORS.length]+'cc';ctx.fillRect(bx-barW/2,by,barW,bh);
    ctx.strokeStyle=COLORS[bi%COLORS.length];ctx.lineWidth=1;ctx.strokeRect(bx-barW/2,by,barW,bh);
  }

  ctx.fillStyle='#64748b';ctx.font='13px sans-serif';ctx.textAlign='center';
  ctx.fillText('注：Q1仅显示3月各省用电量柱状（实测），1-2月请参考表11',W/2,H-10);
}

/* ======================================================
   Part4: 历年趋势
   ====================================================== */
function drawHistory(provs,yearSel){
  var canvas=document.getElementById('historyCanvas');
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  var W=Math.max(900,canvas.getBoundingClientRect().width||canvas.parentElement.clientWidth||900);
  var H=440;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);

  var label=isAll?'全国':(provs.slice(0,2).join('/')+(provs.length>2?'等'+provs.length+'省':''));
  document.getElementById('historyTitle').textContent=label+' · 历年用电量趋势（2020-2025）'+(yearSel&&yearSel!=='2026Q1'?' ★'+yearSel+'年':'');

  var PL=60,PR=35,PT=50,PB=55,cW=W-PL-PR,cH=H-PT-PB;
  var xStep=cW/(YEARS.length-1);

  var datasets=provs.map(function(p,i){
    return {
      label:p,
      vals:YEARS.map(function(y){ return HISTORY[p]?HISTORY[p][y]:0; }),
      color:COLORS[i%COLORS.length]
    };
  });

  var allVals=[];
  datasets.forEach(function(d){ allVals=allVals.concat(d.vals); });
  var maxV=Math.max.apply(null,allVals)*1.15;
  var minV=0;
  var yRange=maxV-minV;

  var toX=function(i){ return PL+i*xStep; };
  var toY=function(v){ return PT+cH-((v-minV)/yRange)*cH; };

  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  for(var i=0;i<=5;i++){
    var v=minV+(yRange/5)*i,y=toY(v);
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+cW,y);
    ctx.strokeStyle='#f1f5f9';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.font='12px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(v).toLocaleString(),PL-8,y+4);
  }
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,PT+cH);ctx.lineTo(PL+cW,PT+cH);ctx.stroke();
  ctx.fillStyle='#64748b';ctx.font='13px sans-serif';ctx.textAlign='center';
  YEARS.forEach(function(y,i){ ctx.fillText(y+'',toX(i),PT+cH+20); });

  var maxLeg=Math.min(datasets.length,7);
  datasets.slice(0,maxLeg).forEach(function(ds,di){
    ctx.beginPath();ctx.arc(PL+di*75+6,10,5,0,Math.PI*2);ctx.fillStyle=ds.color;ctx.fill();
    ctx.fillStyle='#475569';ctx.font='13px sans-serif';ctx.textAlign='left';
    ctx.fillText(ds.label,PL+di*75+16,14);
  });
  if(datasets.length>7){ ctx.fillStyle='#64748b';ctx.font='12px sans-serif';ctx.fillText('…等'+datasets.length+'省',PL+7*75+16,14); }

  // 年份标注点
  var yi=YEARS.indexOf(parseInt(yearSel));
  if(yi>=0){
    var ax=toX(yi);
    ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(ax,PT);ctx.lineTo(ax,PT+cH);
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=1.5;ctx.stroke();
    ctx.setLineDash([]);
  }

  datasets.forEach(function(ds){
    var pts=ds.vals.map(function(v,i){ return {x:toX(i),y:toY(v),v:v}; });
    ctx.beginPath();
    pts.forEach(function(p,i){ i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    ctx.strokeStyle=ds.color;ctx.lineWidth=2.5;ctx.stroke();
    pts.forEach(function(p){
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=ds.color;ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    });
  });
}
